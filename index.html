<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>🌸 男娘值测试🌸</title>
  <style>
    :root {
      --pink-1: #fff0f5;
      --pink-2: #ffe4ec;
      --pink-3: #ffc8d6;
      --pink-4: #f8a5c2;
      --pink-5: #f082ac;
      --pink-6: #e8608c;
      --pink-7: #d43d6a;
      --white: #ffffff;
      --text: #4a3040;
      --text-light: #6b4d5c;
      --shadow: 0 8px 32px rgba(240, 130, 160, 0.18);
      --shadow-lg: 0 16px 48px rgba(220, 100, 140, 0.22);
      --radius: 24px;
      --radius-sm: 14px;
      --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #fce4ec 0%, #f8d5e0 15%, #fde8f0 30%, #f5dae6 45%, #fce4f0 60%, #f8dce8 75%, #fce8f2 90%, #f9dfe9 100%);
      background-attachment: fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }

    /* 花瓣飘落 */
    .petal-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .petal {
      position: absolute;
      top: -60px;
      opacity: 0.55;
      pointer-events: none;
      animation: petalFall linear infinite;
      filter: blur(0.5px);
    }
    @keyframes petalFall {
      0% { transform: translateY(-60px) rotate(0deg) translateX(0px); opacity: 0.65; }
      10% { opacity: 0.8; }
      25% { transform: translateY(25vh) rotate(90deg) translateX(40px); opacity: 0.7; }
      50% { transform: translateY(50vh) rotate(200deg) translateX(-35px); opacity: 0.55; }
      75% { transform: translateY(75vh) rotate(320deg) translateX(30px); opacity: 0.4; }
      90% { opacity: 0.2; }
      100% { transform: translateY(105vh) rotate(420deg) translateX(-20px); opacity: 0.05; }
    }

    .main-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 540px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 36px 28px 32px;
      box-shadow: var(--shadow);
      transition: all var(--transition);
      position: relative;
      overflow: hidden;
      animation: cardIn 0.5s ease-out;
    }
    .card.result-card {
      animation: resultIn 0.55s ease-out;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes resultIn {
      0% { opacity: 0; transform: translateY(20px) scale(0.94); }
      60% { transform: translateY(-4px) scale(1.02); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, #f8c5d0, #f5a0b8, #f8b8c8, #f5a0b8, #f8c5d0);
      border-radius: var(--radius) var(--radius) 0 0;
      opacity: 0.75;
    }

    /* 开始页 */
    .start-page .title-icon {
      text-align: center;
      font-size: 56px;
      margin-bottom: 8px;
      animation: bounceIcon 2s ease-in-out infinite;
    }
    @keyframes bounceIcon {
      0%,100% { transform: translateY(0); }
      30% { transform: translateY(-16px); }
      50% { transform: translateY(0); }
      70% { transform: translateY(-7px); }
      85% { transform: translateY(0); }
    }
    .start-page h1 {
      text-align: center;
      font-size: 30px;
      font-weight: 700;
      color: #d43d6a;
      margin-bottom: 6px;
      letter-spacing: 1.5px;
    }
    .start-page .subtitle {
      text-align: center;
      font-size: 15px;
      color: #c47a8e;
      margin-bottom: 20px;
      letter-spacing: 0.8px;
      line-height: 1.6;
    }
    .info-pills {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 26px;
    }
    .info-pill {
      background: #fff5f8;
      border: 1.5px solid #fdd4df;
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 13px;
      color: #c45a70;
      letter-spacing: 0.5px;
    }
    .btn-start {
      display: block;
      width: 100%;
      max-width: 280px;
      margin: 0 auto;
      padding: 16px 32px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 1.2px;
      color: #fff;
      background: linear-gradient(135deg, #f8a5c2, #f082ac);
      border: none;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 6px 22px rgba(240,130,160,0.4);
      transition: all var(--transition);
      animation: pulseBtn 2.4s ease-in-out infinite;
    }
    @keyframes pulseBtn {
      0%,100% { box-shadow: 0 6px 22px rgba(240,130,160,0.4); }
      50% { box-shadow: 0 10px 34px rgba(240,120,150,0.6), 0 0 0 10px rgba(248,165,194,0.1); }
    }
    .btn-start:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(230,100,140,0.5);
      background: linear-gradient(135deg, #fbb5cf, #f396b8);
    }
    .btn-start:active { transform: scale(0.96); }

    /* 测试页 */
    .test-page { display: none; }
    .progress-wrap { margin-bottom: 20px; }
    .progress-info { display: flex; justify-content: space-between; font-size: 13px; color: #b07085; margin-bottom: 8px; }
    .progress-bar { width: 100%; height: 10px; background: #fde8f0; border-radius: 20px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #f8b8c8, #f082ac, #e8608c); border-radius: 20px; transition: width 0.5s; width: 0%; }
    .question-number { display: inline-block; background: #fff0f5; color: #d43d6a; font-size: 12px; font-weight: 600; padding: 5px 13px; border-radius: 15px; margin-bottom: 14px; }
    .question-text { font-size: 20px; font-weight: 650; color: #4a3040; margin-bottom: 22px; line-height: 1.5; min-height: 55px; }
    .options-list { display: flex; flex-direction: column; gap: 11px; }
    .option-btn {
      display: flex; align-items: center; gap: 12px; width: 100%; padding: 15px 18px; font-size: 15.5px; color: #5a3d48;
      background: #fffdfe; border: 2px solid #f5d5e0; border-radius: var(--radius-sm); cursor: pointer; text-align: left;
      transition: all 0.22s; letter-spacing: 0.3px; user-select: none;
    }
    .option-btn:hover { border-color: #f5a0b8; background: #fff8fa; box-shadow: 0 3px 14px rgba(240,150,175,0.2); transform: translateX(3px); }
    .option-btn:active { transform: scale(0.975); background: #fff0f4; border-color: #f390b0; }
    .option-btn.selected { border-color: #f082ac; background: #fff0f5; box-shadow: 0 0 0 4px rgba(240,130,160,0.12); animation: selectedPop 0.35s; }
    @keyframes selectedPop { 0%{transform:scale(1)} 40%{transform:scale(1.03)} 100%{transform:scale(1)} }
    .opt-icon { font-size: 22px; flex-shrink: 0; width: 30px; text-align: center; }
    .opt-text { flex: 1; }

    /* 结果页 */
    .result-page { display: none; }
    .result-header { text-align: center; margin-bottom: 6px; }
    .result-emoji { font-size: 58px; animation: bounceIcon 1.8s infinite; display: inline-block; }
    .result-grade { font-size: 24px; font-weight: 700; color: #d43d6a; margin-top: 4px; }
    .result-score-wrap { display: flex; justify-content: center; align-items: center; gap: 16px; margin: 16px 0 20px; flex-wrap: wrap; }
    .result-score-circle { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, #fff0f5, #ffe4ec); border: 4px solid #f8c5d6; box-shadow: 0 0 0 6px rgba(248,180,200,0.15); display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .result-score-num { font-size: 34px; font-weight: 800; color: #d43d6a; line-height: 1; }
    .result-score-label { font-size: 11px; color: #b87085; }
    .result-hearts { text-align: center; font-size: 22px; letter-spacing: 3px; margin-bottom: 12px; }

    .radar-container { width: 100%; display: flex; justify-content: center; margin: 8px 0 16px; }
    canvas.radar-canvas { max-width: 100%; height: auto; display: block; }

    .result-desc { text-align: center; font-size: 14.5px; color: #6b4d5c; line-height: 1.7; margin-bottom: 6px; padding: 12px 16px; background: #fffafc; border-radius: 16px; }
    .result-extra-tag { text-align: center; font-size: 13px; color: #c47a8e; margin-bottom: 20px; font-style: italic; }
    .btn-retry { display: block; width: 100%; max-width: 240px; margin: 0 auto; padding: 14px 28px; font-size: 16px; font-weight: 600; letter-spacing: 1px; color: #d43d6a; background: #fff; border: 2.5px solid #f5b8c8; border-radius: 30px; cursor: pointer; transition: all var(--transition); }
    .btn-retry:hover { background: #fff5f8; border-color: #f082ac; box-shadow: 0 4px 16px rgba(240,130,160,0.25); transform: translateY(-2px); }
    .btn-retry:active { transform: scale(0.95); }

    @media (max-width: 480px) {
      .card { padding: 24px 16px 22px; }
      .start-page h1 { font-size: 25px; }
      .question-text { font-size: 17.5px; min-height: 40px; }
      .option-btn { padding: 12px 14px; font-size: 14px; }
      .result-emoji { font-size: 46px; }
      .result-grade { font-size: 21px; }
      .result-score-circle { width: 80px; height: 80px; }
      .result-score-num { font-size: 28px; }
    }
  </style>
</head>
<body>
<div class="petal-container" id="petalContainer"></div>
<div class="main-wrapper" id="mainWrapper"></div>

<script>
  (function() {
    // 花瓣
    const petalContainer = document.getElementById('petalContainer');
    const petalEmojis = ['🌸','💮','🩷','🌷','✿','❀','🎀','💗','🌺','🍥'];
    for (let i=0; i<16; i++) {
      const petal = document.createElement('span');
      petal.classList.add('petal');
      petal.textContent = petalEmojis[Math.floor(Math.random()*petalEmojis.length)];
      petal.style.left = Math.random()*100+'%';
      petal.style.fontSize = (10+Math.random()*20)+'px';
      petal.style.animationDuration = (9+Math.random()*14)+'s';
      petal.style.animationDelay = (Math.random()*12)+'s';
      petalContainer.appendChild(petal);
    }

    const mainWrapper = document.getElementById('mainWrapper');

    // ---------- 32道题目 ----------
    const questions = [
      // 维度1: 外表装扮 (0-6)
      { q:'你更喜欢哪种颜色的衣服搭配？', opts:[
        { text:'深色系（黑/灰/深蓝）', score:1, icon:'🌑' },
        { text:'中性色（白/米色/卡其）', score:2, icon:'🤍' },
        { text:'柔和色（浅紫/淡蓝）', score:3, icon:'💜' },
        { text:'粉色系/可爱印花', score:4, icon:'💗' }
      ], dim:0 },
      { q:'你的日常护肤习惯是？', opts:[
        { text:'几乎不护肤', score:1, icon:'💧' },
        { text:'基础清洁', score:2, icon:'🧼' },
        { text:'水乳保湿', score:3, icon:'🧴' },
        { text:'精致全套护肤+面膜', score:4, icon:'✨' }
      ], dim:0 },
      { q:'对于化妆这件事，你的态度是？', opts:[
        { text:'完全拒绝', score:1, icon:'🚫' },
        { text:'不排斥但自己不化', score:2, icon:'🤷' },
        { text:'偶尔好奇尝试', score:3, icon:'🎨' },
        { text:'喜欢化妆，享受变美', score:4, icon:'💄' }
      ], dim:0 },
      { q:'你有多在意自己的发型？', opts:[
        { text:'几乎不在意', score:1, icon:'💇' },
        { text:'偶尔整理', score:2, icon:'🧢' },
        { text:'经常打理，保持清爽', score:3, icon:'🌟' },
        { text:'定期做造型，喜欢可爱发型', score:4, icon:'🎀' }
      ], dim:0 },
      { q:'你对佩戴饰品（手链、项链等）的看法？', opts:[
        { text:'从不戴', score:1, icon:'⛓️' },
        { text:'可以接受简单的', score:2, icon:'⚪' },
        { text:'喜欢精致的小饰品', score:3, icon:'💍' },
        { text:'超爱各种可爱饰品', score:4, icon:'🌸' }
      ], dim:0 },
      { q:'你的日常穿搭风格偏向？', opts:[
        { text:'运动/休闲为主', score:1, icon:'👟' },
        { text:'简约干净', score:2, icon:'👕' },
        { text:'时尚潮流', score:3, icon:'🕶️' },
        { text:'可爱/软萌风', score:4, icon:'🧸' }
      ], dim:0 },
      { q:'你对做美甲（或涂指甲油）的态度？', opts:[
        { text:'绝对不要', score:1, icon:'🙅' },
        { text:'有点好奇', score:2, icon:'🤔' },
        { text:'自己偷偷试过', score:3, icon:'💅' },
        { text:'喜欢美甲，觉得很好看', score:4, icon:'✨' }
      ], dim:0 },

      // 维度2: 可爱偏好 (7-13)
      { q:'看到可爱的玩偶或饰品时？', opts:[
        { text:'完全无视', score:1, icon:'😐' },
        { text:'瞟一眼', score:2, icon:'👀' },
        { text:'停下来看看', score:3, icon:'🥰' },
        { text:'走不动路，必须拿下', score:4, icon:'🛍️' }
      ], dim:1 },
      { q:'你的手机壁纸通常是？', opts:[
        { text:'系统默认/纯色', score:1, icon:'📱' },
        { text:'风景/科技感', score:2, icon:'🏞️' },
        { text:'动漫角色（帅酷型）', score:3, icon:'😎' },
        { text:'可爱萌宠/粉色系插画', score:4, icon:'🐰' }
      ], dim:1 },
      { q:'逛街时你更容易被什么吸引？', opts:[
        { text:'电子产品', score:1, icon:'💻' },
        { text:'运动装备', score:2, icon:'⚽' },
        { text:'时尚服饰', score:3, icon:'👗' },
        { text:'可爱小物/玩偶店', score:4, icon:'🧸' }
      ], dim:1 },
      { q:'你对粉色系的接受程度？', opts:[
        { text:'完全无法接受', score:1, icon:'🚫' },
        { text:'可以看别人用', score:2, icon:'👀' },
        { text:'自己有一些粉色物品', score:3, icon:'💗' },
        { text:'超爱粉色，生活里很多', score:4, icon:'🎀' }
      ], dim:1 },
      { q:'你会收集可爱的物件吗？（如贴纸、盲盒等）', opts:[
        { text:'从不收集', score:1, icon:'🗑️' },
        { text:'偶尔买一两个', score:2, icon:'🛒' },
        { text:'有喜欢的系列会收集', score:3, icon:'📦' },
        { text:'重度收集控，看见可爱就买', score:4, icon:'💖' }
      ], dim:1 },
      { q:'你对猫耳发箍、蝴蝶结等元素的看法？', opts:[
        { text:'完全无感/觉得奇怪', score:1, icon:'😕' },
        { text:'觉得别人戴挺可爱', score:2, icon:'😊' },
        { text:'自己也想试试', score:3, icon:'🐱' },
        { text:'超级喜欢，经常戴/想戴', score:4, icon:'🎀' }
      ], dim:1 },
      { q:'你常用的聊天表情风格？', opts:[
        { text:'基本不用表情', score:1, icon:'😐' },
        { text:'普通emoji', score:2, icon:'😄' },
        { text:'可爱动物表情', score:3, icon:'🐣' },
        { text:'萌系撒娇表情包', score:4, icon:'🥺' }
      ], dim:1 },

      // 维度3: 行为举止 (14-19)
      { q:'你平时的坐姿习惯更接近？', opts:[
        { text:'大大咧咧', score:1, icon:'🦵' },
        { text:'怎么舒服怎么来', score:2, icon:'🪑' },
        { text:'比较端正', score:3, icon:'🧘' },
        { text:'喜欢并腿或优雅二郎腿', score:4, icon:'💃' }
      ], dim:2 },
      { q:'说话时的语气和用词习惯？', opts:[
        { text:'直来直去，比较粗犷', score:1, icon:'🗣️' },
        { text:'正常中性', score:2, icon:'💬' },
        { text:'比较温和', score:3, icon:'🌿' },
        { text:'常带"呀~""呢~"等语气词', score:4, icon:'🎵' }
      ], dim:2 },
      { q:'拍照时你更倾向于？', opts:[
        { text:'站直比个耶', score:1, icon:'✌️' },
        { text:'自然随意', score:2, icon:'📷' },
        { text:'找角度和光线', score:3, icon:'💡' },
        { text:'托脸/歪头/比心等可爱pose', score:4, icon:'🤳' }
      ], dim:2 },
      { q:'你照镜子的频率？', opts:[
        { text:'几乎不照', score:1, icon:'🪞' },
        { text:'出门前看一下', score:2, icon:'🚪' },
        { text:'经常整理仪容', score:3, icon:'✨' },
        { text:'路过反光物就要照', score:4, icon:'😍' }
      ], dim:2 },
      { q:'走路时你的姿态更接近？', opts:[
        { text:'大步流星，比较随意', score:1, icon:'🏃' },
        { text:'正常步伐', score:2, icon:'🚶' },
        { text:'步幅较小，注意姿态', score:3, icon:'🐾' },
        { text:'轻盈优雅，甚至会小跳步', score:4, icon:'🩰' }
      ], dim:2 },
      { q:'被别人突然夸奖时，你的反应？', opts:[
        { text:'面无表情，内心毫无波澜', score:1, icon:'😐' },
        { text:'礼貌说谢谢', score:2, icon:'🙂' },
        { text:'有点害羞', score:3, icon:'😳' },
        { text:'瞬间脸红，手足无措', score:4, icon:'☺️' }
      ], dim:2 },

      // 维度4: 内心认同 (20-25)
      { q:'被别人夸"可爱"时，你的真实感受？', opts:[
        { text:'不太喜欢，觉得别扭', score:1, icon:'😒' },
        { text:'还好，没什么特别', score:2, icon:'😶' },
        { text:'有点小开心', score:3, icon:'😊' },
        { text:'超级开心！被夸可爱最棒了', score:4, icon:'😆' }
      ], dim:3 },
      { q:'对于穿裙子的看法？', opts:[
        { text:'绝对不可能穿', score:1, icon:'🙅' },
        { text:'有点好奇但不会尝试', score:2, icon:'🤔' },
        { text:'自己在家偷偷试过', score:3, icon:'🏠' },
        { text:'喜欢穿，感觉很好看很自在', score:4, icon:'👗' }
      ], dim:3 },
      { q:'你心目中的理想形象更接近？', opts:[
        { text:'阳刚硬汉', score:1, icon:'💪' },
        { text:'清爽运动少年', score:2, icon:'☀️' },
        { text:'温柔中性文艺青年', score:3, icon:'📖' },
        { text:'可爱甜美的精致男孩', score:4, icon:'🍰' }
      ], dim:3 },
      { q:'你是否曾羡慕过女孩子的装扮或可爱感？', opts:[
        { text:'从来没有', score:1, icon:'🙅' },
        { text:'偶尔有一点点', score:2, icon:'🤏' },
        { text:'经常觉得真好', score:3, icon:'😔' },
        { text:'非常羡慕，希望自己也能那样', score:4, icon:'🥺' }
      ], dim:3 },
      { q:'你对练习伪声（让声音更柔和）的兴趣？', opts:[
        { text:'完全没兴趣', score:1, icon:'🔇' },
        { text:'有点好奇', score:2, icon:'🎤' },
        { text:'私下偷偷练过', score:3, icon:'🎶' },
        { text:'很感兴趣，希望声音更可爱', score:4, icon:'💬' }
      ], dim:3 },
      { q:'如果让你用一个词描述自己的内在气质？', opts:[
        { text:'硬朗', score:1, icon:'🗿' },
        { text:'普通', score:2, icon:'😶' },
        { text:'温柔', score:3, icon:'🌸' },
        { text:'可爱', score:4, icon:'🍬' }
      ], dim:3 },

      // 维度5: 社交表现 (26-31)
      { q:'你的社交媒体头像通常是？', opts:[
        { text:'风景或默认头像', score:1, icon:'🏔️' },
        { text:'动漫角色（帅酷型）', score:2, icon:'😎' },
        { text:'动漫角色（可爱型）', score:3, icon:'🐱' },
        { text:'可爱自拍或萌系插画', score:4, icon:'📸' }
      ], dim:4 },
      { q:'你更喜欢在社交平台看什么内容？', opts:[
        { text:'科技/游戏资讯', score:1, icon:'🎮' },
        { text:'运动/户外', score:2, icon:'🏀' },
        { text:'时尚穿搭', score:3, icon:'👗' },
        { text:'可爱萌宠/美妆', score:4, icon:'🐶' }
      ], dim:4 },
      { q:'和朋友聊天时，你使用可爱表情包的频率？', opts:[
        { text:'几乎不用', score:1, icon:'🙂' },
        { text:'偶尔用', score:2, icon:'😊' },
        { text:'经常用', score:3, icon:'😝' },
        { text:'全是可爱表情包', score:4, icon:'🥰' }
      ], dim:4 },
      { q:'你与亲密朋友互动时更倾向于？', opts:[
        { text:'勾肩搭背，兄弟模式', score:1, icon:'🤝' },
        { text:'正常聊天', score:2, icon:'💬' },
        { text:'温柔体贴', score:3, icon:'🤗' },
        { text:'喜欢撒娇/被照顾', score:4, icon:'🥺' }
      ], dim:4 },
      { q:'你如何看待其他走可爱路线的男生？', opts:[
        { text:'不太理解', score:1, icon:'🤨' },
        { text:'尊重但无感', score:2, icon:'😌' },
        { text:'觉得挺有勇气，欣赏', score:3, icon:'👍' },
        { text:'非常喜欢！甚至想成为朋友', score:4, icon:'💕' }
      ], dim:4 },
      { q:'你容易被可爱的事物融化吗？（比如小动物、萌娃）', opts:[
        { text:'完全不会', score:1, icon:'😐' },
        { text:'偶尔觉得可爱', score:2, icon:'😊' },
        { text:'经常被萌到', score:3, icon:'🥺' },
        { text:'直接融化，忍不住尖叫', score:4, icon:'😭💖' }
      ], dim:4 }
    ];

    const totalQuestions = questions.length; // 32
    const dimensionNames = ['外表装扮', '可爱偏好', '行为举止', '内心认同', '社交表现'];
    const dimensionCount = 5;

    // 结果等级 (总分32~128)
    const resultGrades = [
      { min:32, max:45, emoji:'🦍', grade:'钢铁直男', stars:1, color:'#5a7da8', desc:'你散发着强烈的阳刚之气，与男娘世界几乎绝缘。', tag:'继续做你的猛男吧！💪' },
      { min:46, max:60, emoji:'🙂', grade:'普通男生', stars:2, color:'#6b8e6b', desc:'标准男生，偶尔展现柔和特质，整体保持传统男性气质。', tag:'平凡也是一种魅力~' },
      { min:61, max:76, emoji:'🌸', grade:'温柔系男生', stars:3, color:'#c47a8e', desc:'性格中有明显的温柔特质，可爱潜质正在悄悄萌芽。', tag:'温柔是最高级的魅力呢~' },
      { min:77, max:93, emoji:'💖', grade:'可爱男孩', stars:4, color:'#e8608c', desc:'已经具备相当程度的可爱气质，男娘潜力很大哦！', tag:'可爱即正义！✨' },
      { min:94, max:110, emoji:'🎀', grade:'准男娘', stars:5, color:'#d43d6a', desc:'男娘值突破天际，浑身散发着浓郁的可爱气息。', tag:'就差临门一脚啦~🎯' },
      { min:111, max:128, emoji:'👑', grade:'天赋型男娘', stars:6, color:'#b8355c', desc:'你就是天选的男娘！每个细胞都呼喊着"可爱"二字。', tag:'恭迎男娘之王降临！👑✨' }
    ];

    // 状态
    let currentIndex = 0;
    let scores = []; // 每题得分
    let isTransitioning = false;

    // 渲染开始页
    function renderStart() {
      mainWrapper.innerHTML = `
        <div class="card start-page">
          <div class="title-icon">🎀</div>
          <h1>男娘值测试</h1>
          <p class="subtitle">32道趣味题目 · 五维雷达图<br>深度解析你的可爱属性💗</p>
          <div class="info-pills">
            <span class="info-pill">📝 32题</span>
            <span class="info-pill">⏱️ 约4分钟</span>
            <span class="info-pill">📊 完全不科学</span>
          </div>
          <button class="btn-start" onclick="startTest()">✨ 开始测试 ✨</button>
        </div>
      `;
    }

    function renderQuestion(index) {
      const q = questions[index];
      const progress = Math.round((index / totalQuestions) * 100);
      let optsHTML = q.opts.map((opt, i) => `
        <button class="option-btn" onclick="selectAnswer(${index}, ${i})" data-index="${i}">
          <span class="opt-icon">${opt.icon}</span>
          <span class="opt-text">${opt.text}</span>
        </button>
      `).join('');
      mainWrapper.innerHTML = `
        <div class="card test-page" style="display:block;">
          <div class="progress-wrap">
            <div class="progress-info"><span>第 ${index+1} / ${totalQuestions} 题</span><span>${progress}%</span></div>
            <div class="progress-bar"><div class="progress-fill" style="width:${progress}%;"></div></div>
          </div>
          <span class="question-number">Q${index+1}</span>
          <p class="question-text">${q.q}</p>
          <div class="options-list">${optsHTML}</div>
        </div>
      `;
    }

    // 绘制雷达图
    function drawRadar(canvas, dimensionScores) {
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const width = canvas.width;
      const height = canvas.height;
      const centerX = width / 2;
      const centerY = height / 2;
      const maxVal = 4; // 每题1-4，维度平均分也在这个范围
      const levels = 4;
      const radius = Math.min(width, height) * 0.38;
      const angleStep = (Math.PI * 2) / dimensionCount;
      const startAngle = -Math.PI / 2; // 从顶部开始

      ctx.clearRect(0, 0, width, height);

      // 绘制背景网格
      for (let level = 1; level <= levels; level++) {
        ctx.beginPath();
        const r = radius * (level / levels);
        for (let i = 0; i <= dimensionCount; i++) {
          const angle = startAngle + i * angleStep;
          const x = centerX + r * Math.cos(angle);
          const y = centerY + r * Math.sin(angle);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.strokeStyle = '#f8c5d6';
        ctx.lineWidth = 1.2;
        ctx.stroke();
        ctx.fillStyle = level % 2 === 0 ? 'rgba(255,240,245,0.4)' : 'rgba(255,245,248,0.2)';
        ctx.fill();
      }

      // 绘制轴线
      for (let i = 0; i < dimensionCount; i++) {
        const angle = startAngle + i * angleStep;
        const x = centerX + radius * Math.cos(angle);
        const y = centerY + radius * Math.sin(angle);
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(x, y);
        ctx.strokeStyle = '#f5b8c8';
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      // 绘制维度标签
      ctx.fillStyle = '#6b4d5c';
      ctx.font = 'bold 13px "PingFang SC","Microsoft YaHei",sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      for (let i = 0; i < dimensionCount; i++) {
        const angle = startAngle + i * angleStep;
        const labelRadius = radius + 24;
        const x = centerX + labelRadius * Math.cos(angle);
        const y = centerY + labelRadius * Math.sin(angle);
        ctx.fillText(dimensionNames[i], x, y);
      }

      // 绘制数据区域
      ctx.beginPath();
      for (let i = 0; i < dimensionCount; i++) {
        const score = dimensionScores[i] || 1;
        const ratio = Math.min(score / maxVal, 1);
        const angle = startAngle + i * angleStep;
        const x = centerX + radius * ratio * Math.cos(angle);
        const y = centerY + radius * ratio * Math.sin(angle);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.fillStyle = 'rgba(240,130,172,0.35)';
      ctx.fill();
      ctx.strokeStyle = '#e8608c';
      ctx.lineWidth = 2.5;
      ctx.stroke();

      // 绘制数据点
      for (let i = 0; i < dimensionCount; i++) {
        const score = dimensionScores[i] || 1;
        const ratio = Math.min(score / maxVal, 1);
        const angle = startAngle + i * angleStep;
        const x = centerX + radius * ratio * Math.cos(angle);
        const y = centerY + radius * ratio * Math.sin(angle);
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI*2);
        ctx.fillStyle = '#d43d6a';
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }

    function renderResult(totalScore, dimensionAvgs) {
      // 查找等级
      let grade = resultGrades[0];
      for (const g of resultGrades) {
        if (totalScore >= g.min && totalScore <= g.max) { grade = g; break; }
      }
      const hearts = '❤️'.repeat(grade.stars);
      const percent = Math.round(((totalScore - 32) / (128 - 32)) * 100);

      mainWrapper.innerHTML = `
        <div class="card result-card result-page" style="display:block;">
          <div class="result-header">
            <span class="result-emoji">${grade.emoji}</span>
            <p class="result-grade" style="color:${grade.color};">${grade.grade}</p>
          </div>
          <div class="result-score-wrap">
            <div class="result-score-circle">
              <span class="result-score-num">${totalScore}</span>
              <span class="result-score-label">/ 128 分</span>
            </div>
            <div style="font-size:14px; color:#b87085;">前 ${percent}%</div>
          </div>
          <div class="result-hearts">${hearts}</div>
          <div class="radar-container">
            <canvas id="radarCanvas" class="radar-canvas" width="300" height="300"></canvas>
          </div>
          <p class="result-desc">${grade.desc}</p>
          <p class="result-extra-tag">${grade.tag}</p>
          <button class="btn-retry" onclick="restartTest()">🔄 再测一次</button>
        </div>
      `;

      // 延迟绘制雷达图，确保canvas已存在
      setTimeout(() => {
        const canvas = document.getElementById('radarCanvas');
        if (canvas) {
          // 响应式调整canvas尺寸
          const container = canvas.parentNode;
          const containerWidth = container.clientWidth;
          const size = Math.min(containerWidth * 0.9, 300);
          canvas.width = size;
          canvas.height = size;
          drawRadar(canvas, dimensionAvgs);
        }
      }, 80);
    }

    // 计算各维度平均分
    function calcDimensionAvgs() {
      const dimSums = Array(dimensionCount).fill(0);
      const dimCounts = Array(dimensionCount).fill(0);
      questions.forEach((q, idx) => {
        const dim = q.dim;
        const score = scores[idx];
        dimSums[dim] += score;
        dimCounts[dim] += 1;
      });
      return dimSums.map((sum, i) => dimCounts[i] > 0 ? parseFloat((sum / dimCounts[i]).toFixed(2)) : 1);
    }

    // 交互
    window.startTest = function() {
      currentIndex = 0;
      scores = [];
      isTransitioning = false;
      renderQuestion(0);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.selectAnswer = function(qIndex, optIndex) {
      if (isTransitioning || qIndex !== currentIndex) return;
      isTransitioning = true;
      const score = questions[qIndex].opts[optIndex].score;
      scores.push(score);

      const allBtns = mainWrapper.querySelectorAll('.option-btn');
      allBtns.forEach(b => b.classList.remove('selected'));
      const target = mainWrapper.querySelector(`.option-btn[data-index="${optIndex}"]`);
      if (target) target.classList.add('selected');
      allBtns.forEach(b => b.style.pointerEvents = 'none');

      setTimeout(() => {
        currentIndex++;
        if (currentIndex < totalQuestions) {
          renderQuestion(currentIndex);
          isTransitioning = false;
          window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
          const totalScore = scores.reduce((a,b)=>a+b, 0);
          const dimAvgs = calcDimensionAvgs();
          renderResult(totalScore, dimAvgs);
          isTransitioning = false;
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      }, 360);
    };

    window.restartTest = function() {
      currentIndex = 0;
      scores = [];
      isTransitioning = false;
      renderStart();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    // 初始化
    renderStart();
    console.log('🌸 32题男娘值测试 · 雷达图版已就绪');
  })();
</script>
</body>
</html>
